  <!-- Loading Styles -->
  <style>
    /* Loading screen */
    .app-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0f;
    }
    
    .app-loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Offline banner */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      text-align: center;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 500;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    
    .offline-banner.show {
      transform: translateY(0);
    }
    
    /* Toast container */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 380px;
      width: 100%;
      pointer-events: none;
    }
    
    /* Smooth theme transition */
    html {
      transition: background-color 0.3s, color 0.3s;
    }
    
    body {
      transition: background-color 0.3s, color 0.3s;
    }
  </style>
  
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased">
  
  <!-- App Container -->
  <div id="app">
    <div class="app-loading">
      <div class="text-center">
        <div class="app-loading-spinner mx-auto mb-4"></div>
        <p class="text-gray-400 text-sm font-medium">Memuat Nexovra...</p>
        <p class="text-gray-600 text-xs mt-2">Sistem Manajemen Keuangan</p>
      </div>
    </div>
  </div>
  
  <!-- Offline Banner -->
  <div id="offline-banner" class="offline-banner">
    📡 Anda sedang offline. Beberapa fitur mungkin tidak tersedia.
  </div>
  
  <!-- Application Script -->
  <script type="module" src="/src/main.js"></script>
  
  <!-- Service Worker & Offline Detection -->
  <script>
    // ============================================================
    // SERVICE WORKER REGISTRATION
    // ============================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('✅ Service Worker registered:', registration.scope);
          })
          .catch(error => {
            console.error('❌ Service Worker registration failed:', error);
          });
      });
    }
    
    // ============================================================
    // OFFLINE / ONLINE DETECTION
    // ============================================================
    const offlineBanner = document.getElementById('offline-banner');
    
    function showOfflineBanner() {
      offlineBanner?.classList.add('show');
    }
    
    function hideOfflineBanner() {
      offlineBanner?.classList.remove('show');
    }
    
    window.addEventListener('offline', () => {
      showOfflineBanner();
      // Auto-hide after 5 seconds
      setTimeout(hideOfflineBanner, 5000);
    });
    
    window.addEventListener('online', () => {
      hideOfflineBanner();
    });
    
    // Set initial state
    if (!navigator.onLine) {
      showOfflineBanner();
    }
    
    // ============================================================
    // THEME DETECTION
    // ============================================================
    (function() {
      const savedTheme = localStorage.getItem('theme');
      
      if (savedTheme === 'light') {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#f9fafb');
      } else if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#0a0a0f');
      } else {
        // Auto detect system preference
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.classList.add('light');
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#f9fafb');
        }
      }
    })();
    
    // Listen for system theme changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      const savedTheme = localStorage.getItem('theme');
      if (!savedTheme) {
        if (e.matches) {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#0a0a0f');
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.classList.add('light');
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#f9fafb');
        }
      }
    });
  </script>
</body>
